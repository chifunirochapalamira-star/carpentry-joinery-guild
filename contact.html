<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login / Sign Up | Carpentry and Joinery</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* Reset + body */
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
body { display:flex; justify-content:center; align-items:center; min-height:100vh; background:#23242a; color:#fff; }

/* Nav bar */
header { position:fixed; top:0; width:100%; padding:1.2rem 6%; background:rgba(15,15,15,0.9); backdrop-filter:blur(10px); display:flex; justify-content:space-between; align-items:center; z-index:1000; }
.logo { font-size:1.7rem; font-weight:bold; color:#d4a373; }
nav ul { display:flex; list-style:none; }
nav ul li { margin-left:2rem; }
nav ul li a { text-decoration:none; color:#e0e0e0; font-weight:500; transition:color 0.3s; }
nav ul li a:hover { color:#d4a373; }

/* Box */
.box { width:400px; background:#1c1c1c; border-radius:15px; overflow:hidden; padding:30px; box-shadow:0 10px 30px rgba(0,0,0,0.7); margin-top:80px; }

/* Toggle buttons */
.toggle { display:flex; justify-content:center; margin-bottom:20px; }
.toggle button { flex:1; padding:10px 0; cursor:pointer; background:#28292d; border:none; color:#fff; font-weight:bold; transition:0.3s; }
.toggle button.active { background:#45f3ff; color:#16100e; }

/* Forms */
form { display:none; flex-direction:column; position:relative; }
form.active { display:flex; }
form h1 { text-align:center; margin-bottom:20px; color:#45f3ff; }

/* Inputs */
label { margin-bottom:5px; color:#d4a373; }
input { padding:10px; margin-bottom:15px; border-radius:10px; border:none; outline:none; background:rgba(255,255,255,0.1); color:#fff; width:100%; }
input[type="submit"] { background:#45f3ff; color:#16100e; font-weight:bold; cursor:pointer; transition:0.3s; }
input[type="submit"]:hover { background:#d4a373; }

/* Show password toggle */
.password-wrapper { position:relative; }
.password-wrapper i { position:absolute; right:10px; top:50%; transform:translateY(-50%); cursor:pointer; color:#d4a373; }

/* Link text */
.link-text { font-size:0.85rem; color:#aab7b8; text-align:center; margin-top:10px; }
.link-text a { color:#d9138a; font-weight:bold; text-decoration:none; }

/* Status messages */
#signup-status, #login-status { text-align:center; margin-top:10px; padding:10px; border-radius:6px; font-weight:bold; display:none; }
.success { background:#2e7d32; color:#fff; }
.error { background:#c62828; color:#fff; }
</style>
</head>
<body>

<header>
  <div class="logo">Carpentry and Joinery</div>
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="course.html">Course</a></li>
    </ul>
  </nav>
</header>

<div class="box">
  <div class="toggle">
    <button id="loginBtn" class="active">Login</button>
    <button id="signupBtn">Sign Up</button>
  </div>

  <!-- Login Form -->
  <form id="loginForm" class="active">
    <h1>Login</h1>
    <label for="loginUser">Username</label>
    <input type="text" id="loginUser" placeholder="Username" required>

    <label for="loginPass">Password</label>
    <div class="password-wrapper">
      <input type="password" id="loginPass" placeholder="Password" required>
      <i class="fa fa-eye" id="toggleLoginPass"></i>
    </div>

    <input type="submit" value="Login">
    <p class="link-text">Forgot password? <a href="#">Click Here</a></p>
    <p id="login-status"></p>
  </form>

  <!-- Sign Up Form -->
  <form id="signupForm">
    <h1>Sign Up</h1>
    <label for="signupName">Full Name</label>
    <input type="text" id="signupName" placeholder="Full Name" required>
    <label for="signupUser">Username</label>
    <input type="text" id="signupUser" placeholder="Username" required>
    <label for="signupEmail">Email</label>
    <input type="email" id="signupEmail" placeholder="Email" required>
    <label for="signupPass">Password</label>
    <div class="password-wrapper">
      <input type="password" id="signupPass" placeholder="Password" required>
      <i class="fa fa-eye" id="toggleSignupPass"></i>
    </div>
    <input type="submit" value="Sign Up">
    <p id="signup-status"></p>
  </form>
</div>

<script>
// Toggle forms
const loginBtn = document.getElementById('loginBtn');
const signupBtn = document.getElementById('signupBtn');
const loginForm = document.getElementById('loginForm');
const signupForm = document.getElementById('signupForm');

loginBtn.addEventListener('click', () => {
  loginBtn.classList.add('active');
  signupBtn.classList.remove('active');
  loginForm.classList.add('active');
  signupForm.classList.remove('active');
});

signupBtn.addEventListener('click', () => {
  signupBtn.classList.add('active');
  loginBtn.classList.remove('active');
  signupForm.classList.add('active');
  loginForm.classList.remove('active');
});

// Show/hide password
const toggleLoginPass = document.getElementById('toggleLoginPass');
toggleLoginPass.addEventListener('click', () => {
  const pass = document.getElementById('loginPass');
  pass.type = pass.type === 'password' ? 'text' : 'password';
});

const toggleSignupPass = document.getElementById('toggleSignupPass');
toggleSignupPass.addEventListener('click', () => {
  const pass = document.getElementById('signupPass');
  pass.type = pass.type === 'password' ? 'text' : 'password';
});

// Sign Up
const signupStatus = document.getElementById('signup-status');
signupForm.addEventListener('submit', (e) => {
  e.preventDefault();
  const fullName = document.getElementById('signupName').value.trim();
  const username = document.getElementById('signupUser').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPass').value.trim();

  if(!fullName || !username || !email || !password){
    signupStatus.textContent = "All fields are required.";
    signupStatus.className = 'error';
    signupStatus.style.display = 'block';
    return;
  }

  let users = JSON.parse(localStorage.getItem('users') || '[]');
  if(users.some(u => u.username === username)){
    signupStatus.textContent = "Username already taken.";
    signupStatus.className = 'error';
    signupStatus.style.display = 'block';
    return;
  }

  users.push({fullName, username, email, password});
  localStorage.setItem('users', JSON.stringify(users));

  signupStatus.textContent = "Sign Up successful! You can now login.";
  signupStatus.className = 'success';
  signupStatus.style.display = 'block';
  signupForm.reset();
});

// Login
const loginStatus = document.getElementById('login-status');
loginForm.addEventListener('submit', (e) => {
  e.preventDefault();
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value.trim();
  const users = JSON.parse(localStorage.getItem('users') || '[]');

  const user = users.find(u => u.username === username && u.password === password);
  if(user){
    loginStatus.textContent = `Welcome, ${user.fullName}! Redirecting...`;
    loginStatus.className = 'success';
    loginStatus.style.display = 'block';
    loginForm.reset();
    setTimeout(() => {
      window.location.href = "course.html"; // redirect to course page
    }, 1500);
  } else {
    loginStatus.textContent = "Invalid username or password.";
    loginStatus.className = 'error';
    loginStatus.style.display = 'block';
  }
});
</script>

</body>
</html>
